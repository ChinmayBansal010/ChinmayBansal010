name: Update Streak Stats

on:
  schedule:
    - cron: "0 3 * * *" # Every day at 03:00 UTC
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/streak-stats.yml"

concurrency:
  group: update-streak-stats
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Streak Stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          token: ${{ secrets.STREAK_STATS_TOKEN }}
          path: profile/streak.svg
          options: >
            user=${{ github.repository_owner }}
            &theme=tokyonight
            &hide_border=false
            &border_radius=10
            &disable_animations=false
            &include_all_commits=true

      - name: Commit and Push Changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add profile/streak.svg

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update streak stats"

          for i in {1..5}; do
            echo "Push attempt $i..."

            git pull --rebase origin main

            if git push origin main; then
              echo "Push successful."
              exit 0
            fi

            echo "Push failed. Retrying in 5 seconds..."
            sleep 5
          done

          echo "Failed to push after 5 attempts."
          exit 1
